<html>
    <head>
        <image src="https://www.tennosbusiness.com/wp-content/uploads/2020/06/tennos_favicon.png" style="height: 60px;width: 60px;"></image>
        <title>Administrador de productos</title>
        <link rel="stylesheet" type="text/css" href="/css/Styless.css">
        <link rel="stylesheet" type="text/css" href="/css/Styless.css">
        <script src="/js/app.js"></script>
    </head>
    <body>
        <h1>Administrador productos</h1>

        
        <h4>Todos los productos</h4>
        <button onclick="getAllProducts()">Buscar todos los productos</button>
        <div id="allProductsContainer"></div>

        
        <h4>Producto específico</h4>
        <button onclick="getProductById()">Buscar producto</button>
        <input type="number" id="productIdSearch" placeholder="Ingrese el ID del producto">
        <div id="productByIdContainer"></div>

        
        <h4>Crear producto</h4>
        <label for="productId">ID del Producto:</label>
        <input type="number" id="productId" placeholder="Ingrese el ID del producto">
        <label for="productName">Nombre del Producto:</label>
        <input type="text" id="productName" placeholder="Ingrese el nombre del producto">
        <label for="productPrice">Precio del Producto:</label>
        <input type="number" id="productPrice" placeholder="Ingrese el precio del producto">
        <button onclick="createProduct()">Crear Producto</button>

        
        <h4>Actualizar producto</h4>
        <label for="updateProductId">ID del Producto:</label>
        <input type="number" id="updateProductId" placeholder="Ingrese el ID del producto" required>
        <br>
        <label for="updateProductName">Nombre del Producto:</label>
        <input type="text" id="updateProductName" placeholder="Ingrese el nombre del producto" required>
        <br>
        <label for="updateProductPrice">Precio del Producto:</label>
        <input type="number" id="updateProductPrice" placeholder="Ingrese el precio del producto" required>
        <br>
        <button onclick="updateProduct()">Actualizar Producto</button>
        <p id="updateMessage"></p> 


                
        <h4>Eliminar producto</h4>
        <label for="deleteProductId">ID del Producto a Eliminar:</label>
        <input type="number" id="deleteProductId" placeholder="Ingrese el ID del producto">
        <button onclick="deleteProduct()">Eliminar Producto</button>
        <p id="deleteMessage"></p> 

        

        
        <p id="responseMessage"></p>


       

    </body>
</html>
